<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Martin Family Pool</title>
  
  <!-- Papa Parse Library for robust CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="link-container">
    <a href="index.html">Home</a>
    <a href="nba2.html">Pool Standings</a>
    <a href="nbapicks.html">First Round-West</a>
  </div>

  <h2>First Round-Eastern Conference Picks</h2>
  
  <div class="table-container">
    <table id="csvTable">
      <thead>
        <tr id="tableHeader"></tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td>Loading data...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    // ⚠️ Replace this with your actual published Google Sheets CSV URL
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtXwmuVqVAreUf8JJOqAjQffDlOm5V2c7cb4PpaqLhsCHDvqO2sX1hOdrjbaegAmFcF6xTS8dqOeB4/pub?gid=1344577295&single=true&output=csv";

    async function loadTable() {
      try {
        const response = await fetch(sheetUrl);
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: false, 
          skipEmptyLines: true,
          complete: function(results) {
              // Start from Row 5
              const allRows = results.data.slice(4); 
              
              const headerRow = document.getElementById('tableHeader');
              const tableBody = document.getElementById('tableBody');
              headerRow.innerHTML = '';
              tableBody.innerHTML = '';

              // 1. Set Headers (Row 5) and remove last 4 columns
              const headers = allRows[0].slice(0, -8);
              headers.forEach(h => {
                  const th = document.createElement('th');
                  th.textContent = h;
                  headerRow.appendChild(th);
              });

              // 2. Handle Data Rows
              // .slice(1, -6) takes everything after header, but stops 6 rows before the end
              const middleData = allRows.slice(1, -6); 
              
              // Grab the very last row
              const lastRow = allRows[allRows.length - 1];
              
              // Combine them: Middle data + the single last row
              const finalDataList = middleData.concat([lastRow]);

              // 3. Render to Table
              finalDataList.forEach((row, index) => {
                const tr = document.createElement('tr');

                // Check if this is the last row in the array
                if (index === finalDataList.length - 1) {
                    tr.classList.add('total-row');
                }

                const visibleCells = row.slice(0, -8);
                visibleCells.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
                });
            }
          });


      } catch (error) {
        console.error("Failed to load spreadsheet:", error);
        document.getElementById('tableBody').innerHTML = "<tr><td>Error loading data.</td></tr>";
      }
    }

    // Initialize fetching when the page loads
    loadTable();
  </script>

  <div id="scroll">
    <p>Scroll on mobile ></p>
  </div>

</body>
</html>
