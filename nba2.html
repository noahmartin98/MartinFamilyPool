<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Sheets CSV to HTML Table</title>
  
  <!-- Papa Parse Library for robust CSV parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

  <div class="link-container">
    <h5><a href="index.html">Home</a></h5>
    <h5><a href="nbapicks.html">First Round-West</a></h5>
    <h5><a href="nbapickse.html">First Round-East</a></h5>
  </div>

  <h2>NBA Pool Standings</h2>
  
  <div class="table-container">
    <table id="csvTable">
      <thead>
        <tr id="tableHeader"></tr>
      </thead>
      <tbody id="tableBody">
        <tr>
          <td>Loading data...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    // ⚠️ Replace this with your actual published Google Sheets CSV URL
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTtXwmuVqVAreUf8JJOqAjQffDlOm5V2c7cb4PpaqLhsCHDvqO2sX1hOdrjbaegAmFcF6xTS8dqOeB4/pub?gid=2023219747&single=true&output=csv";

    async function loadTable() {
      try {
        const response = await fetch(sheetUrl);
        const csvText = await response.text();

        Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true,
          complete: function(results) {
            const data = results.data;
            const fields = results.meta.fields;

            const headerRow = document.getElementById('tableHeader');
            const tableBody = document.getElementById('tableBody');

            // 1. Clear placeholder/old loading content
            headerRow.innerHTML = '';
            tableBody.innerHTML = '';

            // 2. Build the Table Headers
            fields.forEach(field => {
              const th = document.createElement('th');
              th.textContent = field;
              headerRow.appendChild(th);
            });

            // 3. Build the Table Rows
            data.forEach(row => {
              const tr = document.createElement('tr');
              fields.forEach(field => {
                const td = document.createElement('td');
                td.textContent = row[field];
                tr.appendChild(td);
              });
              tableBody.appendChild(tr);
            });
          }
        });

      } catch (error) {
        console.error("Failed to load spreadsheet:", error);
        document.getElementById('tableBody').innerHTML = "<tr><td>Error loading data.</td></tr>";
      }
    }

    // Initialize fetching when the page loads
    loadTable();
  </script>

  <div id="scroll">
    <p>Scroll on mobile ></p>
  </div>


</body>
</html>
